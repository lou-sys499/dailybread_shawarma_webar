<!DOCTYPE html>
<html>
  <head>
    <title>DailyBread - AR Shawarma Experience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js for A-Frame (Stable Version) -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <!-- Draco Decoder for compressed GLBs -->
    <script src="https://www.gstatic.com/draco/versioned/decoders/1.5.6/draco_decoder.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background-color: #000; }
      #loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #FFFDF5;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 1000;
        transition: opacity 0.5s ease;
      }
      .spinner {
        width: 50px; height: 50px;
        border: 5px solid #FF6B35;
        border-top: 5px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #ui {
        position: fixed;
        bottom: 20px; left: 10px; right: 10px;
        text-align: center;
        z-index: 100;
        pointer-events: none;
      }
      .badge {
        background: rgba(255, 255, 255, 0.9);
        padding: 10px 20px;
        border-radius: 30px;
        font-weight: 800;
        font-size: 10px;
        letter-spacing: 0.1em;
        color: #FF6B35;
        text-transform: uppercase;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        display: inline-block;
      }
      #back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        background: white;
        border: none;
        padding: 12px 20px;
        border-radius: 15px;
        font-weight: 900;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: #2D2D2D;
        text-transform: uppercase;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        z-index: 101;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <a href="/" id="back-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      EXIT AR
    </a>

    <div id="loader">
      <div class="spinner"></div>
      <p style="margin-top: 20px; font-weight: 800; color: #2D2D2D; text-transform: uppercase; letter-spacing: 0.1em;">DailyBread AR Loading...</p>
    </div>

    <div id="ui">
      <div class="badge" id="status-badge">Searching for Hiro Marker...</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; patternRatio: 0.5; trackingMethod: best;"
      renderer="colorManagement: true; antialias: true; precision: medium;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    >
      <a-assets></a-assets>

      <a-marker 
        preset="hiro" 
        id="hiro-marker"
        smooth="true"
        smoothCount="5"
        smoothTolerance="0.01"
        smoothThreshold="2"
      >
        <!-- Very small pivot box to confirm center of marker -->
        <a-box position="0 0 0" material="color: #FF6B35; opacity: 0.8" scale="0.1 0.1 0.1"></a-box>
        
        <a-entity
          id="shawarma-entity"
          position="0 0.1 0"
          scale="2 2 2"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
        ></a-entity>
      </a-marker>

      <a-entity light="type: ambient; color: #FFF; intensity: 1"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 0.8" position="-1 1 1"></a-entity>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('loader');
        const entity = document.getElementById('shawarma-entity');
        const dracoPath = 'https://www.gstatic.com/draco/versioned/decoders/1.5.6/';
        
        const urlParams = new URLSearchParams(window.location.search);
        let modelUrl = urlParams.get('model') || '/models/duck.glb';
        const fallbackUrl = 'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Duck/glTF-Binary/Duck.glb';

        console.log("AR Mode Started. Model URL:", modelUrl);

        const marker = document.getElementById('hiro-marker');
        const statusBadge = document.getElementById('status-badge');
        const scene = document.querySelector('a-scene');

        scene.addEventListener('loaded', () => {
          console.log("A-Frame Scene Loaded");
          // Check for camera stream periodically
          const checkCamera = setInterval(() => {
            const video = document.querySelector('video');
            if (video && video.readyState >= 2) {
              console.log("Webcam feed active");
              clearInterval(checkCamera);
            } else if (video) {
              console.log("Webcam initializing...");
            }
          }, 1000);
        });
        
        marker.addEventListener('markerFound', () => {
          console.log("Hiro Marker Found!");
          statusBadge.textContent = "Hiro Marker Active";
          statusBadge.style.background = "#FF6B35";
          statusBadge.style.color = "white";
        });

        marker.addEventListener('markerLost', () => {
          console.log("Hiro Marker Lost!");
          statusBadge.textContent = "Searching for Hiro Marker...";
          statusBadge.style.background = "rgba(255, 255, 255, 0.9)";
          statusBadge.style.color = "#FF6B35";
        });

        function setModel(url) {
          console.log("Requesting gltf-model from:", url);
          entity.setAttribute('gltf-model', url);
        }

        setModel(modelUrl);

        entity.addEventListener('model-loaded', () => {
          console.log("SUCCESS: GLTF Model loaded from", modelUrl);
          // Hide feedback cube once model is here
          const fallbackBox = marker.querySelector('a-box');
          if (fallbackBox) fallbackBox.setAttribute('visible', 'false');
          
          loader.style.opacity = '0';
          setTimeout(() => {
            loader.style.display = 'none';
          }, 500);
        });

        entity.addEventListener('model-error', (e) => {
          console.error("CRITICAL: GLTF Model Error for", modelUrl, e);
          if (modelUrl !== fallbackUrl) {
            console.warn("Retrying with fallback...");
            modelUrl = fallbackUrl;
            setModel(modelUrl);
          } else {
            console.error("All models failed.");
            const p = document.querySelector('#loader p');
            p.textContent = "Hardware incompatibility detected. please refresh.";
            p.style.color = "#FF6B35";
          }
        });

        // If nothing appears after 15s...
        setTimeout(() => {
          if (loader.style.display !== 'none') {
             const p = document.querySelector('#loader p');
             p.innerHTML = "Still loading...<br/><span style='font-size: 0.8em; opacity: 0.7;'>Try a different angle or lighting</span>";
          }
        }, 15000);

        // If marker not found after 10s of being in scene
        setTimeout(() => {
          if (statusBadge.textContent === "Searching for Hiro Marker...") {
             statusBadge.innerHTML = "Hiro Marker not detected?<br/><span style='font-size: 0.8em; opacity: 0.7;'>Ensure border is black & clear</span>";
          }
        }, 10000);
      });
    </script>
  </body>
</html>
